<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מטלות</title>
<meta name="application-name" content="מטלות">
<meta name="apple-mobile-web-app-title" content="מטלות">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f18">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;מטלות&quot;,&quot;short_name&quot;:&quot;מטלות&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230d0f18&quot;,&quot;theme_color&quot;:&quot;%230d0f18&quot;}">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d0f18'/><rect x='20' y='25' width='60' height='8' rx='4' fill='%235b8aff'/><rect x='20' y='42' width='45' height='8' rx='4' fill='%235b8aff'/><rect x='20' y='59' width='52' height='8' rx='4' fill='%235b8aff'/><rect x='20' y='76' width='35' height='8' rx='4' fill='%233ddc97'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d0f18'/><rect x='20' y='25' width='60' height='8' rx='4' fill='%235b8aff'/><rect x='20' y='42' width='45' height='8' rx='4' fill='%235b8aff'/><rect x='20' y='59' width='52' height='8' rx='4' fill='%235b8aff'/><rect x='20' y='76' width='35' height='8' rx='4' fill='%233ddc97'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');

:root {
  --bg: #0d0f18;
  --surface: #161923;
  --surface2: #1e2235;
  --surface3: #252a40;
  --border: #2a2f4a;
  --text: #e2e5f5;
  --text-dim: #6b728f;
  --text-mid: #9ba3c4;
  --accent: #5b8aff;
  --accent-glow: rgba(91,138,255,0.25);
  --red: #ff4d6d;
  --green: #3ddc97;
  --orange: #ffb347;
  --purple: #a78bfa;
  --teal: #22d3ee;
  --r: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,15,24,0.93);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
}

.logo { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
.logo h1 {
  font-size: 1.25rem; font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-btns { display: flex; gap: 8px; align-items: center; }

.btn-icon {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 11px;
  color: var(--text-mid);
  font-family: 'Heebo', sans-serif;
  font-size: .88rem; font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn-icon:hover { background: var(--surface3); color: var(--text); border-color: var(--accent); }

.btn-add {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: var(--red);
  border: none; color: #fff;
  font-size: 1.9rem; line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(255,77,109,0.45);
  transition: transform .2s, box-shadow .2s;
  flex-shrink: 0;
}
.btn-add:hover { transform: scale(1.12); box-shadow: 0 6px 26px rgba(255,77,109,0.6); }
.btn-add:active { transform: scale(0.96); }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}

.filter-group { display: flex; align-items: center; gap: 7px; }
.filter-label { font-size: 1.05rem; color: var(--text-dim); font-weight: 600; white-space: nowrap; }

.days-input {
  width: 56px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 5px 8px;
  font-family: 'Heebo', sans-serif;
  font-size: 1.05rem;
  text-align: center;
}
.days-input:focus { outline: none; border-color: var(--accent); }

.btn-pill {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-mid);
  font-family: 'Heebo', sans-serif;
  font-size: 1.05rem; font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn-pill:hover { border-color: var(--accent); color: var(--accent); }
.btn-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── SEARCH ── */
.search-row {
  padding: 10px 16px;
  display: flex; gap: 8px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

.search-wrap { position: relative; flex: 1; }
.search-wrap input {
  width: 100%; max-width: 220px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 36px 9px 12px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 1.05rem;
}
.search-wrap input::placeholder { color: var(--text-dim); }
.search-wrap input:focus { outline: none; border-color: var(--accent); }
.search-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 1.1rem; pointer-events: none; }

/* ── FORM ── */
.form-section {
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  padding: 20px 18px 10px;
  display: none;
}

.form-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.form-header h2 { font-size: 1.05rem; font-weight: 800; color: var(--accent); }
.btn-close { background: none; border: none; color: var(--text-dim); font-size: 1.3rem; cursor: pointer; padding: 0 4px; }

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 12px;
}
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field.full { grid-column: 1/-1; }
.form-field label { font-size: .95rem; color: var(--text-dim); font-weight: 600; }

.form-field input,
.form-field textarea,
.form-field select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 1.05rem;
  direction: rtl;
  transition: border-color .2s;
}
.form-field input:focus,
.form-field textarea:focus,
.form-field select:focus { outline: none; border-color: var(--accent); background: var(--surface3); }
.form-field textarea { resize: vertical; min-height: 65px; }
.form-field select option { background: var(--surface2); }

.toggle-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; cursor: pointer; user-select: none;
}
.toggle-label { font-size: 1rem; color: var(--text-mid); }

.toggle {
  width: 40px; height: 22px;
  background: var(--border);
  border-radius: 11px;
  position: relative; transition: background .2s; flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  background: #fff; border-radius: 50%;
  top: 3px; right: 3px; transition: right .2s;
}
.toggle.on::after { right: calc(100% - 19px); }

.recurrence-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 12px;
}

.form-actions { display: flex; gap: 10px; padding-bottom: 18px; }

.btn-primary {
  flex: 1; padding: 11px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border: none; border-radius: 10px;
  color: #fff; font-family: 'Heebo', sans-serif;
  font-size: 1.1rem; font-weight: 800;
  cursor: pointer; transition: opacity .2s;
  box-shadow: 0 3px 14px var(--accent-glow);
}
.btn-primary:hover { opacity: .88; }

.btn-cancel {
  padding: 11px 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-mid);
  font-family: 'Heebo', sans-serif;
  font-size: 1.1rem; cursor: pointer;
}
.btn-cancel:hover { background: var(--surface3); }

/* ── TASK LIST ── */
.task-list { padding: 0 14px 100px; }

.section-head {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 4px 6px;
}
.section-head .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.section-head span { font-size: 1.05rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
.section-head .count {
  margin-right: auto;
  background: var(--surface2); border-radius: 20px;
  padding: 2px 8px; font-size: 1rem; color: var(--text-dim);
}

.head-overdue .dot { background: var(--red); }
.head-overdue span { color: var(--red); }
.head-today .dot { background: var(--green); }
.head-today span { color: var(--green); }
.head-future .dot { background: var(--accent); }
.head-future span { color: var(--accent); }
.head-notime .dot { background: var(--orange); }
.head-notime span { color: var(--orange); }
.head-done .dot { background: var(--text-dim); }
.head-done span { color: var(--text-dim); }

.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px; margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 11px;
  position: relative; overflow: hidden;
  transition: transform .15s, box-shadow .15s;
  animation: fadeUp .22s ease;
}
.task-card:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,0,0,.35); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-card::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
}
.task-card.overdue::before { background: var(--red); }
.task-card.today::before { background: var(--green); }
.task-card.future::before { background: var(--accent); }
.task-card.notime::before { background: var(--orange); }
.task-card.done-card { background: var(--surface); }
.task-card.done-card::before { background: var(--text-dim); }
.done-card .task-title { color: #ffffff; }

.check-btn {
  width: 23px; height: 23px; border-radius: 50%;
  border: 2px solid var(--border); background: transparent;
  cursor: pointer; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; font-size: .9rem;
}
.check-btn:hover { border-color: var(--green); }
.check-btn.checked { background: var(--green); border-color: var(--green); color: #fff; }

.task-body { flex: 1; min-width: 0; }
.task-top { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.task-title { font-weight: 700; font-size: 1.1rem; word-break: break-word; line-height: 1.35; }

.badge {
  padding: 2px 7px; border-radius: 20px;
  font-size: .82rem; font-weight: 700;
  white-space: nowrap; flex-shrink: 0;
}
.badge-recur { background: rgba(34,211,238,.1); color: var(--teal); }

.task-meta { font-size: 1rem; color: var(--text-dim); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.task-meta .date-tag { display: flex; align-items: center; gap: 3px; }
.task-meta .date-tag.overdue { color: var(--red); }
.task-meta .date-tag.today { color: var(--green); }
.task-meta .date-tag.future { color: var(--accent); }
.task-meta .date-tag.notime { color: var(--orange); }

.task-note { font-size: 1.05rem; color: var(--text-dim); margin-top: 5px; line-height: 1.4; font-weight: 300; }

.task-actions { display: flex; gap: 2px; flex-shrink: 0; }
.act-btn {
  background: none; border: none; cursor: pointer;
  padding: 5px 7px; border-radius: 8px;
  font-size: 1.1rem; color: var(--text-dim);
  transition: background .15s, color .15s;
}
.act-btn:hover { background: var(--surface2); color: var(--text); }

.empty { text-align: center; padding: 50px 20px; color: var(--text-dim); }
.empty .e-icon { font-size: 2.8rem; margin-bottom: 12px; }
.empty p { font-size: 1.05rem; line-height: 1.6; }

.toast {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--surface3); border: 1px solid var(--border);
  padding: 9px 22px; border-radius: 30px;
  font-size: 1rem; opacity: 0;
  transition: all .3s; z-index: 999;
  pointer-events: none; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MODALS ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.75); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 22px;
  width: min(92vw, 440px); direction: rtl;
  animation: fadeUp .2s ease;
}
.modal h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 6px; color: var(--accent); }
.modal .hint { font-size: .95rem; color: var(--text-dim); margin-bottom: 12px; }
.modal .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

.btn-success { background: var(--green); border: none; border-radius: 9px; color: #000; padding: 9px 18px; font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; }
.btn-default { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); padding: 9px 18px; font-family: 'Heebo', sans-serif; font-size: 1rem; cursor: pointer; }
.btn-danger-sm { background: var(--red); border: none; border-radius: 9px; color: #fff; padding: 9px 18px; font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; }

.confirm-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 26px 22px;
  width: min(88vw,320px); direction: rtl; text-align: center;
  animation: fadeUp .2s ease;
}
.confirm-box p { margin-bottom: 18px; font-size: 1.1rem; line-height: 1.5; }
.confirm-box .btn-row { display: flex; gap: 8px; justify-content: center; }

@media (max-width: 400px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-field.full { grid-column: 1; }
  .recurrence-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="top">
  <div class="logo">
    <div>
      <h1>מטלות</h1>
      <div id="todayDate" style="font-size:1rem;color:var(--text-dim);font-weight:400;margin-top:1px;"></div>
    </div>
  </div>
  <div class="header-btns">
    <button class="btn-icon" onclick="openBackup()">גיבוי</button>
    <div style="width:8px"></div>
    <button class="btn-add" onclick="openForm(null)" title="הוסף מטלה">+</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">הצג</span>
    <input type="number" class="days-input" id="daysAhead" value="7" min="1" max="3650">
    <span class="filter-label">ימים</span>
    <button class="btn-pill" onclick="applyDays()">הצג</button>
  </div>
  <button class="btn-pill" id="btnAll" onclick="toggleAll()">הצג הכל</button>
  <button class="btn-pill" id="btnDone" onclick="toggleDone()">הצג מטלות שהושלמו</button>
</div>

<!-- SEARCH -->
<div class="search-row">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="חיפוש..." oninput="renderTasks()">
  </div>
  <button class="btn-pill" onclick="clearSearch()" style="flex-shrink:0">איפוס</button>
</div>

<!-- ADD/EDIT FORM -->
<div class="form-section" id="formSection">
  <div class="form-header">
    <h2 id="formTitle">➕ מטלה חדשה</h2>
    <button class="btn-close" onclick="cancelForm()">✕</button>
  </div>

  <div class="form-field full" style="margin-bottom:12px">
    <label>כותרת *</label>
    <input type="text" id="fTitle" placeholder="כותרת המטלה...">
  </div>

  <div class="toggle-row" onclick="toggleNoTime()">
    <div class="toggle" id="toggleNoTime"></div>
    <span class="toggle-label">מטלה ללא זמן (לידיעה בלבד)</span>
  </div>

  <div id="dateTimeFields">
    <div class="form-grid">
      <div class="form-field">
        <label>תאריך</label>
        <input type="date" id="fDate">
      </div>
      <div class="form-field">
        <label>שעה (אופציונלי)</label>
        <input type="time" id="fTime">
      </div>
    </div>
  </div>

  <div class="recurrence-row">
    <div class="form-field">
      <label>חזרתיות</label>
      <select id="fRecur" onchange="renderRecurFields()">
        <option value="">ללא</option>
        <option value="daily">יומי</option>
        <option value="weekly">שבועי</option>
        <option value="monthly">חודשי</option>
        <option value="yearly">שנתי</option>
      </select>
    </div>
    <div class="form-field" id="recurUntilField" style="display:none">
      <label>עד תאריך</label>
      <input type="date" id="fRecurUntil">
    </div>
  </div>

  <div class="form-field full" style="margin-bottom:12px">
    <label>הערה</label>
    <textarea id="fNote" placeholder="הערות נוספות..."></textarea>
  </div>

  <div class="form-actions">
    <button class="btn-primary" onclick="saveTask()">✅ שמור מטלה</button>
    <button class="btn-cancel" onclick="cancelForm()">ביטול</button>
  </div>
</div>

<!-- TASK LIST -->
<div class="task-list" id="taskList"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BACKUP MODAL -->
<div class="overlay" id="backupOverlay">
  <div class="modal">
    <h3>גיבוי נתונים</h3>
    <p class="hint">ייצוא: שומר קובץ JSON ל-Downloads.<br>ייבוא: בחר קובץ JSON שנשמר קודם.<br>ייבוא חיצוני: ייבוא מתוכנה אחרת (ממיר אוטומטית).</p>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importFromFile(event)">
    <input type="file" id="importExtFile" accept=".json,.txt" style="display:none" onchange="importExternal(event)">
    <div class="btn-row">
      <button class="btn-default" onclick="exportData()">📤 ייצוא לקובץ</button>
      <button class="btn-success" onclick="document.getElementById('importFile').click()">📥 ייבוא מקובץ</button>
      <button class="btn-default" onclick="document.getElementById('importExtFile').click()">🔄 ייבוא חיצוני</button>
      <button class="btn-default" onclick="closeOverlay('backupOverlay')">סגור</button>
    </div>
  </div>
</div>

<!-- CALENDAR MODAL -->
<div class="overlay" id="calendarOverlay">
  <div class="confirm-box">
    <p id="calendarMsg">האם להוסיף את המטלה ליומן Google?</p>
    <div class="btn-row">
      <button class="btn-success" id="calendarOk">📅 הוסף ליומן</button>
      <button class="btn-default" id="calendarSkip">דלג</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMsg">האם למחוק את המטלה?</p>
    <div class="btn-row">
      <button class="btn-danger-sm" id="confirmOk">מחק</button>
      <button class="btn-default" onclick="closeOverlay('confirmOverlay')">ביטול</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let tasks = [];
let editingId = null;
let noTimeMode = false;
let showAll = false;
let hideDone = true;

const DAY_NAMES = ['א\'','ב\'','ג\'','ד\'','ה\'','ו\'','ש\''];

// ── STORAGE ──
function save() {
  localStorage.setItem('tasks_v2', JSON.stringify(tasks));
}
function saveDays() {
  const val = parseInt(document.getElementById('daysAhead').value) || 7;
  localStorage.setItem('days_v2', val);
}
function load() {
  try { tasks = JSON.parse(localStorage.getItem('tasks_v2') || '[]'); } catch { tasks = []; }
  const savedDays = localStorage.getItem('days_v2');
  if (savedDays) document.getElementById('daysAhead').value = savedDays;
}

// ── INIT ──
load();
renderTasks();

(function() {
  const now = new Date();
  const dayName = DAY_NAMES[now.getDay()];
  const dateStr = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
  document.getElementById('todayDate').textContent = `היום: ${dayName} ${dateStr}`;
})();

function applyDays() {
  showAll = false;
  document.getElementById('btnAll').className = 'btn-pill';
  saveDays();
  renderTasks();
}

// ── FORM ──
function openForm(id) {
  editingId = id;
  noTimeMode = false;
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('formTitle').textContent = id ? '✏️ עריכת מטלה' : '➕ מטלה חדשה';

  const t = id ? tasks.find(x => x.id === id) : null;
  document.getElementById('fTitle').value = t ? t.title : '';
  document.getElementById('fNote').value = t ? (t.note || '') : '';
  document.getElementById('fRecur').value = t ? (t.recur || '') : '';
  document.getElementById('fRecurUntil').value = t ? (t.recurUntil || '') : '';

  if (t && t.noTime) {
    noTimeMode = true;
    document.getElementById('fDate').value = '';
    document.getElementById('fTime').value = '';
  } else {
    document.getElementById('fDate').value = t ? (t.date || todayStr()) : todayStr();
    document.getElementById('fTime').value = t ? (t.time || '') : '';
  }

  updateToggleUI();
  renderRecurFields();
  document.getElementById('fTitle').focus();
  document.getElementById('formSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function cancelForm() {
  document.getElementById('formSection').style.display = 'none';
  editingId = null;
  noTimeMode = false;
}

function toggleNoTime() {
  noTimeMode = !noTimeMode;
  updateToggleUI();
}
function updateToggleUI() {
  document.getElementById('toggleNoTime').className = 'toggle' + (noTimeMode ? ' on' : '');
  document.getElementById('dateTimeFields').style.display = noTimeMode ? 'none' : 'block';
}

function renderRecurFields() {
  document.getElementById('recurUntilField').style.display = document.getElementById('fRecur').value ? 'block' : 'none';
}

function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('נא להזין כותרת'); return; }

  const date = noTimeMode ? '' : document.getElementById('fDate').value;
  const time = noTimeMode ? '' : document.getElementById('fTime').value;
  const recur = document.getElementById('fRecur').value;
  const recurUntil = document.getElementById('fRecurUntil').value;
  const note = document.getElementById('fNote').value.trim();

  if (!noTimeMode && !date) { showToast('נא לבחור תאריך'); return; }

  let savedTask;
  if (editingId) {
    const idx = tasks.findIndex(x => x.id === editingId);
    if (idx > -1) {
      tasks[idx] = { ...tasks[idx], title, date, time, noTime: noTimeMode, note, recur, recurUntil };
      savedTask = tasks[idx];
    }
  } else {
    savedTask = {
      id: Date.now().toString(),
      title, date, time,
      noTime: noTimeMode,
      note, recur, recurUntil,
      done: false,
      createdAt: new Date().toISOString()
    };
    tasks.push(savedTask);
  }

  save();
  cancelForm();
  renderTasks();
  scrollToTop();
  showToast(editingId ? 'המטלה עודכנה ✓' : 'המטלה נוספה ✓');

  // הצע הוספה ליומן (רק אם יש תאריך)
  if (savedTask && !savedTask.noTime && savedTask.date) {
    promptCalendar(savedTask);
  }
}

// ── GOOGLE CALENDAR ──
function promptCalendar(task) {
  document.getElementById('calendarMsg').textContent = `האם להוסיף את "${task.title}" ליומן Google?`;
  document.getElementById('calendarOk').onclick = () => {
    closeOverlay('calendarOverlay');
    addToGoogleCalendar(task);
  };
  document.getElementById('calendarSkip').onclick = () => closeOverlay('calendarOverlay');
  document.getElementById('calendarOverlay').classList.add('open');
}

function addToGoogleCalendar(task) {
  const title = encodeURIComponent(task.title);
  const details = encodeURIComponent(task.note || '');

  // בניית תאריך/שעה בפורמט Google Calendar
  const dateParts = task.date.split('-'); // YYYY-MM-DD
  const y = dateParts[0], m = dateParts[1], d = dateParts[2];

  let dates;
  if (task.time) {
    const timeParts = task.time.split(':');
    const h = timeParts[0], min = timeParts[1];
    // שעת התחלה + שעה אחת
    const startDate = new Date(parseInt(y), parseInt(m)-1, parseInt(d), parseInt(h), parseInt(min));
    const endDate = new Date(startDate.getTime() + 60*60*1000);
    const fmt = dt => `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}T${String(dt.getHours()).padStart(2,'0')}${String(dt.getMinutes()).padStart(2,'0')}00`;
    dates = `${fmt(startDate)}/${fmt(startDate)}`;
  } else {
    // כל היום
    const next = `${y}${m}${String(parseInt(d)+1).padStart(2,'0')}`;
    dates = `${y}${m}${d}/${next}`;
  }

  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${details}&crm=AVAILABLE&trp=false`;
  window.open(url, '_blank');
}

// ── RENDER ──
function renderTasks() {
  const days = parseInt(document.getElementById('daysAhead').value) || 7;
  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const cutoff = new Date(todayMidnight); cutoff.setDate(cutoff.getDate() + days);

  const filtered = tasks.filter(t => {
    if (query && !t.title.toLowerCase().includes(query) && !(t.note||'').toLowerCase().includes(query)) return false;
    return true;
  });

  const active = filtered.filter(t => !t.done);
  const done = filtered.filter(t => t.done);

  const overdue = [], today = [], future = [], notime = [];

  active.forEach(t => {
    if (t.noTime || !t.date) { notime.push(t); return; }
    const d = parseDate(t.date);
    if (!d) { notime.push(t); return; }
    const dMid = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (dMid < todayMidnight) overdue.push(t);
    else if (dMid.getTime() === todayMidnight.getTime()) today.push(t);
    else {
      if (!showAll && dMid > cutoff) return;
      future.push(t);
    }
  });

  const sortByDate = (a, b) => {
    const da = parseDate(a.date) || new Date(0);
    const db = parseDate(b.date) || new Date(0);
    if (da.getTime() !== db.getTime()) return da - db;
    return (a.time || '99:99').localeCompare(b.time || '99:99');
  };
  overdue.sort(sortByDate); today.sort(sortByDate); future.sort(sortByDate);
  notime.sort((a,b) => a.title.localeCompare(b.title, 'he'));
  done.sort(sortByDate);

  const container = document.getElementById('taskList');
  container.innerHTML = '';

  const total = overdue.length + today.length + future.length + notime.length;
  if (total === 0 && (hideDone || done.length === 0)) {
    container.innerHTML = `<div class="empty"><div class="e-icon">✅</div><p>אין מטלות להצגה.<br>לחץ + להוספת מטלה חדשה.</p></div>`;
    return;
  }

  if (overdue.length) {
    container.appendChild(sectionHead('head-overdue', 'חלף הזמן', overdue.length));
    overdue.forEach(t => container.appendChild(makeCard(t, 'overdue')));
  }
  if (today.length) {
    container.appendChild(sectionHead('head-today', 'היום', today.length));
    today.forEach(t => container.appendChild(makeCard(t, 'today')));
  }
  if (future.length) {
    container.appendChild(sectionHead('head-future', 'עתיד', future.length));
    future.forEach(t => container.appendChild(makeCard(t, 'future')));
  }
  if (notime.length) {
    container.appendChild(sectionHead('head-notime', 'לידיעה (ללא זמן)', notime.length));
    notime.forEach(t => container.appendChild(makeCard(t, 'notime')));
  }
  if (!hideDone && done.length) {
    container.appendChild(sectionHead('head-done', 'הושלמו', done.length));
    done.forEach(t => container.appendChild(makeCard(t, 'done-card')));
  }
}

function sectionHead(cls, label, count) {
  const div = document.createElement('div');
  div.className = 'section-head ' + cls;
  div.innerHTML = `<div class="dot"></div><span>${label}</span><span class="count">${count}</span>`;
  return div;
}

function makeCard(t, type) {
  const card = document.createElement('div');
  card.className = 'task-card ' + type;

  const check = document.createElement('button');
  check.className = 'check-btn' + (t.done ? ' checked' : '');
  check.innerHTML = t.done ? '✓' : '';
  check.title = t.done ? 'בטל השלמה' : 'סמן כהושלם';
  check.onclick = () => toggleDoneTask(t.id);

  const body = document.createElement('div');
  body.className = 'task-body';

  const top = document.createElement('div');
  top.className = 'task-top';
  const titleEl = document.createElement('span');
  titleEl.className = 'task-title';
  titleEl.textContent = t.title;
  top.appendChild(titleEl);
  if (t.recur) top.appendChild(makeBadge('badge-recur', recurLabel(t.recur)));
  body.appendChild(top);

  const meta = document.createElement('div');
  meta.className = 'task-meta';
  if (!t.noTime && t.date) {
    const d = parseDate(t.date);
    const dayName = d ? DAY_NAMES[d.getDay()] : '';
    const dateStr = t.date.split('-').reverse().join('/');
    const todayMid = new Date(); todayMid.setHours(0,0,0,0);
    const taskMid = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diffDays = Math.round((taskMid - todayMid) / 86400000);
    const daysLabel = diffDays !== 0 ? ` (${diffDays})` : '';
    const dtag = document.createElement('span');
    dtag.className = 'date-tag ' + (type === 'overdue' ? 'overdue' : type === 'today' ? 'today' : type === 'future' ? 'future' : '');
    dtag.textContent = `${dayName} ${dateStr}${t.time ? ' • ' + t.time : ''}${daysLabel}`;
    meta.appendChild(dtag);
  } else if (t.noTime) {
    const ntag = document.createElement('span');
    ntag.className = 'date-tag notime';
    ntag.textContent = 'לידיעה';
    meta.appendChild(ntag);
  }
  body.appendChild(meta);

  if (t.note) {
    const note = document.createElement('div');
    note.className = 'task-note';
    note.textContent = t.note;
    body.appendChild(note);
  }

  const actions = document.createElement('div');
  actions.className = 'task-actions';
  const editBtn = document.createElement('button');
  editBtn.className = 'act-btn'; editBtn.title = 'עריכה'; editBtn.textContent = '✏️';
  editBtn.onclick = () => openForm(t.id);
  const delBtn = document.createElement('button');
  delBtn.className = 'act-btn'; delBtn.title = 'מחיקה'; delBtn.textContent = '🗑️';
  delBtn.onclick = () => confirmDelete(t.id);
  actions.appendChild(editBtn);
  actions.appendChild(delBtn);

  card.appendChild(check);
  card.appendChild(body);
  card.appendChild(actions);
  return card;
}

function makeBadge(cls, text) {
  const s = document.createElement('span');
  s.className = 'badge ' + cls;
  s.textContent = text;
  return s;
}

function recurLabel(r) {
  return { daily: '🔁 יומי', weekly: '🔁 שבועי', monthly: '🔁 חודשי', yearly: '🔁 שנתי' }[r] || '';
}

// ── ACTIONS ──
function toggleDoneTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  save(); renderTasks();
  showToast(t.done ? 'סומן כהושלם ✓' : 'הוחזר לפעיל');
}

function confirmDelete(id) {
  document.getElementById('confirmMsg').textContent = 'האם למחוק את המטלה? פעולה זו אינה ניתנת לביטול.';
  document.getElementById('confirmOk').onclick = () => { deleteTask(id); closeOverlay('confirmOverlay'); };
  document.getElementById('confirmOverlay').classList.add('open');
}

function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  save(); renderTasks();
  showToast('המטלה נמחקה');
}

function toggleAll() {
  showAll = !showAll;
  document.getElementById('btnAll').className = 'btn-pill' + (showAll ? ' active' : '');
  renderTasks();
}

function toggleDone() {
  hideDone = !hideDone;
  document.getElementById('btnDone').textContent = hideDone ? 'הצג מטלות שהושלמו' : 'הסתר מטלות שהושלמו';
  renderTasks();
}

// ── BACKUP ──
function openBackup() {
  document.getElementById('importFile').value = '';
  document.getElementById('backupOverlay').classList.add('open');
}

function exportData() {
  const json = JSON.stringify({ tasks }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const date = now.toISOString().slice(0,10);
  const time = now.toTimeString().slice(0,5).replace(':','-');
  a.download = `tasks-claude-backup_${date}_${time}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('הקובץ נשמר ✓');
}

function importFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.tasks)) throw new Error();
      tasks = data.tasks;
      save(); renderTasks();
      closeOverlay('backupOverlay');
      showToast('הנתונים יובאו בהצלחה ✓');
    } catch {
      showToast('שגיאה: קובץ גיבוי לא תקין');
    }
  };
  reader.readAsText(file);
}

function importExternal(event) {
  const file = event.target.files[0];
  if (!file) return;
  document.getElementById('importExtFile').value = '';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.tasks)) throw new Error('אין מערך tasks');

      const converted = data.tasks.map(t => ({
        id: t.id || Date.now().toString() + Math.random(),
        title: t.title || '',
        date: t.date || '',
        time: t.time || '',
        noTime: !!t.infoOnly || !t.date,
        note: t.note || '',
        recur: t.recur || '',
        recurUntil: t.recurUntil || '',
        done: !!t.done,
        createdAt: t.createdAt
          ? (typeof t.createdAt === 'number' ? new Date(t.createdAt).toISOString() : t.createdAt)
          : new Date().toISOString()
      }));

      let added = 0, skipped = 0;
      const existingIds = new Set(tasks.map(t => t.id));
      converted.forEach(t => {
        if (existingIds.has(t.id)) { skipped++; }
        else { tasks.push(t); added++; }
      });

      save(); renderTasks();
      closeOverlay('backupOverlay');
      showToast(`יובאו ${added} מטלות ✓${skipped ? ' (' + skipped + ' כפולות דולגו)' : ''}`);
    } catch(err) {
      showToast('שגיאה בייבוא: ' + (err.message || 'קובץ לא תקין'));
    }
  };
  reader.readAsText(file, 'utf-8');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  renderTasks();
}

// ── HELPERS ──
function parseDate(str) {
  if (!str) return null;
  const parts = str.split('-');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function scrollToTop() {
  document.getElementById('top').scrollIntoView({ behavior: 'smooth' });
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

document.querySelectorAll('.overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('open'); });
});

document.getElementById('fTitle').addEventListener('keydown', e => { if (e.key === 'Enter') saveTask(); });
</script>
